name: doc2code Codex Runner

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to run Codex on (optional)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: doc2code-codex-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  codex:
    name: codex
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/codex run')) ||
      (github.event_name == 'pull_request' && github.event.action == 'labeled' && github.event.label.name == 'codex:run') ||
      (github.event_name == 'workflow_dispatch')

    steps:
      - name: Resolve PR number
        id: pr
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.pr_number }}" ]; then
            echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout PR head
        if: ${{ steps.pr.outputs.number != '' }}
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ steps.pr.outputs.number }}/head
          fetch-depth: 0

      - name: Checkout current branch (workflow_dispatch fallback)
        if: ${{ steps.pr.outputs.number == '' }}
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate prompt log
        shell: bash
        run: |
          python scripts/doc2code_prompt_guard.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Codex CLI
        shell: bash
        run: |
          npm install -g @openai/codex@0.106.0
          codex --version

      - name: Determine latest prompt log file
        id: prompt
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d "prompt_logs" ]; then
            echo "ERROR: prompt_logs/ does not exist yet."
            echo "Open a PR so the bootstrap workflow can create:"
            echo "  - a CR entry in BUILD_CONSTITUTION.md"
            echo "  - prompt_logs/CR-YYYYMMDD-HHMM.md"
            exit 2
          fi

          shopt -s nullglob
          files=(prompt_logs/CR-*.md)
          shopt -u nullglob

          if [ ${#files[@]} -eq 0 ]; then
            echo "ERROR: No prompt logs found (expected prompt_logs/CR-YYYYMMDD-HHMM.md)."
            exit 2
          fi

          LATEST_PROMPT="$(ls -1t prompt_logs/CR-*.md | head -n 1)"
          echo "latest=$LATEST_PROMPT" >> "$GITHUB_OUTPUT"

      - name: Comment: Codex Started (with logs link)
        if: ${{ steps.pr.outputs.number != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number("${{ steps.pr.outputs.number }}");
            const repoUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}`;
            const runUrl  = `${repoUrl}/actions/runs/${context.runId}`;
            const promptPath = "${{ steps.prompt.outputs.latest }}";
            const branch = (context.ref || "").replace('refs/heads/','');
            const promptView = `${repoUrl}/blob/${branch}/${promptPath}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `🤖 **Codex Runner started**\n- Prompt log: ${promptView}\n- Run logs: ${runUrl}`
            });

      - name: Debug OpenAI key presence (safe)
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "OPENAI_API_KEY is EMPTY in this step."
            echo "Most likely: secrets are not available in this run context (fork PR / restricted)."
            exit 2
          fi
          echo "OPENAI_API_KEY length: ${#OPENAI_API_KEY}"
          echo "OPENAI_API_KEY prefix: ${OPENAI_API_KEY:0:3}***"
          echo "GitHub event: $GITHUB_EVENT_NAME"
          echo "Actor: $GITHUB_ACTOR"

      - name: Run Codex from latest prompt log
        if: ${{ steps.prompt.outputs.latest != '' }}
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "ERROR: OPENAI_API_KEY secret missing (empty at runtime)."
            exit 2
          fi

          LATEST_PROMPT="${{ steps.prompt.outputs.latest }}"
          echo "Using prompt log: $LATEST_PROMPT"
          PROMPT_CONTENT="$(cat "$LATEST_PROMPT")"

          # Force the env var into the codex process
          OPENAI_API_KEY="$OPENAI_API_KEY" codex exec "$PROMPT_CONTENT"

      - name: Commit and push changes (if any)
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          if git status --porcelain | grep -q .; then
            git add -A
            git commit -m "chore(doc2code): codex changes"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Comment: Codex Finished (with logs link)
        if: ${{ always() && steps.pr.outputs.number != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number("${{ steps.pr.outputs.number }}");
            const status = "${{ job.status }}";
            const emoji = status === "success" ? "✅" : "❌";
            const repoUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}`;
            const runUrl  = `${repoUrl}/actions/runs/${context.runId}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `${emoji} **Codex Runner finished:** **${status}**\n\n🔎 Logs: ${runUrl}`
            });
