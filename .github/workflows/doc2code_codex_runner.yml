name: doc2code Codex Runner

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to run Codex on (optional)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: doc2code-codex-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  codex:
    name: codex
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/codex run')) ||
      (github.event_name == 'pull_request' && github.event.action == 'labeled' && github.event.label.name == 'codex:run') ||
      (github.event_name == 'workflow_dispatch')

    steps:
      - name: Resolve PR number (and PR head ref)
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;

            // Determine PR number
            let prNumber = "";
            if (eventName === "issue_comment") {
              prNumber = String(context.payload.issue.number || "");
            } else if (eventName === "pull_request") {
              prNumber = String(context.payload.pull_request.number || "");
            } else if (eventName === "workflow_dispatch") {
              prNumber = String(core.getInput("pr_number") || "");
            }

            // If no PR number, we still allow workflow_dispatch to run on current branch
            core.setOutput("number", prNumber);

            // If we have a PR number, fetch PR details (head ref + sha)
            if (prNumber) {
              const pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: Number(prNumber),
              });
              core.setOutput("head_ref", pr.data.head.ref);
              core.setOutput("head_sha", pr.data.head.sha);
            } else {
              core.setOutput("head_ref", "");
              core.setOutput("head_sha", "");
            }

      - name: Checkout PR head
        if: ${{ steps.pr.outputs.number != '' }}
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ steps.pr.outputs.number }}/head
          fetch-depth: 0

      - name: Checkout current branch (workflow_dispatch fallback)
        if: ${{ steps.pr.outputs.number == '' }}
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate prompt log
        run: |
          python scripts/doc2code_prompt_guard.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Codex CLI
        run: |
          npm install -g @openai/codex@0.106.0
          codex --version

      - name: Determine latest prompt log file
        id: prompt
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d "prompt_logs" ]; then
            echo "ERROR: prompt_logs/ does not exist yet."
            echo "Open a PR so the bootstrap workflow can create:"
            echo "  - a CR entry in BUILD_CONSTITUTION.md"
            echo "  - prompt_logs/CR-YYYYMMDD-HHMM.md"
            exit 2
          fi

          shopt -s nullglob
          files=(prompt_logs/CR-*.md)
          shopt -u nullglob

          if [ ${#files[@]} -eq 0 ]; then
            echo "ERROR: No prompt logs found (expected prompt_logs/CR-YYYYMMDD-HHMM.md)."
            echo "Open a PR (or run bootstrap) to generate one."
            exit 2
          fi

          LATEST_PROMPT="$(ls -1t prompt_logs/CR-*.md | head -n 1)"
          echo "latest=$LATEST_PROMPT" >> "$GITHUB_OUTPUT"

      - name: Upsert runner status comment (Started)
        if: ${{ steps.pr.outputs.number != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number("${{ steps.pr.outputs.number }}");
            const marker = "<!-- DOC2CODE_CODEX_RUNNER -->";

            const repoUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}`;
            const runUrl  = `${repoUrl}/actions/runs/${context.runId}`;
            const headRef = "${{ steps.pr.outputs.head_ref }}";
            const promptPath = "${{ steps.prompt.outputs.latest }}";
            const promptView = `${repoUrl}/blob/${headRef}/${promptPath}`;

            const body =
`${marker}
🤖 **Codex Runner: STARTED**
- Prompt log: ${promptView}
- Run logs: ${runUrl}

_Status will update here when finished._`;

            // Find existing bot comment w/ marker and update it; else create.
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find(c => (c.body || "").includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: Run Codex from latest prompt log
        if: ${{ steps.prompt.outputs.latest != '' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "ERROR: OPENAI_API_KEY secret missing."
            exit 2
          fi

          LATEST_PROMPT="${{ steps.prompt.outputs.latest }}"
          echo "Using prompt log: $LATEST_PROMPT"

          PROMPT_CONTENT="$(cat "$LATEST_PROMPT")"

          export OPENAI_API_KEY="${OPENAI_API_KEY}"

          codex exec "$PROMPT_CONTENT"

      - name: Commit and push changes (if any)
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          if git status --porcelain | grep -q .; then
            git add -A
            git commit -m "chore(doc2code): codex changes"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Upsert runner status comment (Finished)
        if: ${{ always() && steps.pr.outputs.number != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number("${{ steps.pr.outputs.number }}");
            const status = "${{ job.status }}";
            const emoji = status === "success" ? "✅" : "❌";
            const marker = "<!-- DOC2CODE_CODEX_RUNNER -->";

            const repoUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}`;
            const runUrl  = `${repoUrl}/actions/runs/${context.runId}`;
            const headRef = "${{ steps.pr.outputs.head_ref }}";
            const promptPath = "${{ steps.prompt.outputs.latest }}";
            const promptView = promptPath ? `${repoUrl}/blob/${headRef}/${promptPath}` : "(prompt not found)";

            const body =
`${marker}
${emoji} **Codex Runner: FINISHED** — **${status.toUpperCase()}**
- Prompt log: ${promptView}
- Run logs: ${runUrl}`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find(c => (c.body || "").includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
