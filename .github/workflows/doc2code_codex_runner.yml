name: doc2code Codex Runner

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to run Codex on (optional)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: doc2code-codex-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  codex:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/codex run')) ||
      (github.event_name == 'pull_request' && github.event.action == 'labeled' && github.event.label.name == 'codex:run') ||
      (github.event_name == 'workflow_dispatch')

    steps:
      - name: Resolve PR number
        id: pr
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.pr_number }}" ]; then
            echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout PR head
        if: ${{ steps.pr.outputs.number != '' }}
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ steps.pr.outputs.number }}/head
          fetch-depth: 0

      - name: Checkout current branch (workflow_dispatch fallback)
        if: ${{ steps.pr.outputs.number == '' }}
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate prompt log (guardrails)
        shell: bash
        run: |
          python scripts/doc2code_prompt_guard.py

      - name: Determine latest prompt log file
        id: prompt
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d "prompt_logs" ]; then
            echo "ERROR: prompt_logs/ does not exist yet."
            exit 2
          fi

          shopt -s nullglob
          files=(prompt_logs/CR-*.md)
          shopt -u nullglob

          if [ ${#files[@]} -eq 0 ]; then
            echo "ERROR: No prompt logs found (expected prompt_logs/CR-YYYYMMDD-HHMM.md)."
            exit 2
          fi

          LATEST_PROMPT="$(ls -1t prompt_logs/CR-*.md | head -n 1)"
          echo "latest=$LATEST_PROMPT" >> "$GITHUB_OUTPUT"
          echo "Latest prompt: $LATEST_PROMPT"

      - name: Debug OPENAI_API_KEY presence (prints length only)
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "ERROR: OPENAI_API_KEY is empty in this workflow run."
            exit 2
          fi
          echo "OPENAI_API_KEY length: ${#OPENAI_API_KEY}"

      - name: Upsert PR comment (started)
        if: ${{ steps.pr.outputs.number != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- DOC2CODE_CODEX_RUNNER -->";
            const prNumber = Number("${{ steps.pr.outputs.number }}");
            const repoUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}`;
            const runUrl  = `${repoUrl}/actions/runs/${context.runId}`;
            const promptPath = "${{ steps.prompt.outputs.latest }}";
            const branch = (context.ref || "").replace("refs/heads/","");
            const promptView = `${repoUrl}/blob/${branch}/${promptPath}`;

            const body = [
              marker,
              "🤖 **Codex Runner started**",
              "",
              `- Prompt log: ${promptView}`,
              `- Run logs: ${runUrl}`,
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find(c => (c.body || "").includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: Run Codex (official action)
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: ${{ steps.prompt.outputs.latest }}
          model: gpt-5.3-codex
          sandbox: workspace-write

      - name: Commit and push changes (if any)
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          if git status --porcelain | grep -q .; then
            git add -A
            git commit -m "chore(doc2code): codex changes"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Upsert PR comment (finished)
        if: ${{ always() && steps.pr.outputs.number != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- DOC2CODE_CODEX_RUNNER -->";
            const prNumber = Number("${{ steps.pr.outputs.number }}");
            const status = "${{ job.status }}";
            const emoji = status === "success" ? "✅" : "❌";
            const repoUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}`;
            const runUrl  = `${repoUrl}/actions/runs/${context.runId}`;
            const promptPath = "${{ steps.prompt.outputs.latest }}";
            const branch = (context.ref || "").replace("refs/heads/","");
            const promptView = `${repoUrl}/blob/${branch}/${promptPath}`;

            const body = [
              marker,
              `${emoji} **Codex Runner finished**`,
              "",
              `- Status: **${status}**`,
              `- Prompt log: ${promptView}`,
              `- Run logs: ${runUrl}`,
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find(c => (c.body || "").includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
